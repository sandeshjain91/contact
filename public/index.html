<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Share Your Contact Details</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Theme tokens (updated by JS) ─────────────────────────────────────── */
    :root {
      --t1: #667eea;
      --t2: #764ba2;
    }

    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

    body {
      min-height: 100dvh;
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
      background: linear-gradient(135deg, var(--t1), var(--t2));
      transition: background 0.5s ease;
    }

    /* ── Card ──────────────────────────────────────────────────────────────── */
    .card {
      background: #fff; border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      padding: 20px 24px; width: 100%; max-width: 480px; position: relative;
    }

    /* ── Settings button ───────────────────────────────────────────────────── */
    .settings-btn {
      position: absolute; top: 14px; right: 14px;
      width: 34px; height: 34px; border-radius: 50%; border: none;
      background: #f4f4f8; color: #888; font-size: 17px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, color 0.2s, transform 0.35s;
      touch-action: manipulation;
    }
    .settings-btn:hover { background: #ebe8ff; color: var(--t1); }
    .settings-btn.open  { transform: rotate(60deg); background: #ebe8ff; color: var(--t1); }

    /* ── Header ────────────────────────────────────────────────────────────── */
    .header { text-align: center; margin-bottom: 16px; }
    .icon {
      width: 48px; height: 48px; border-radius: 50%;
      background: linear-gradient(135deg, var(--t1), var(--t2));
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 8px; font-size: 22px;
      transition: background 0.5s ease;
    }
    h1 { font-size: 20px; color: #1a1a2e; font-weight: 700; }
    .subtitle { color: #888; font-size: 13px; margin-top: 4px; }

    /* ── Fields ────────────────────────────────────────────────────────────── */
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .field { margin-bottom: 11px; }
    .field label {
      display: block; font-size: 11px; font-weight: 700; color: #888;
      text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px;
    }
    .field input, .field textarea {
      width: 100%; padding: 9px 12px;
      border: 1.5px solid #e4e4e4; border-radius: 9px;
      font-size: 16px; color: #1a1a2e; background: #fafafa;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      outline: none; font-family: inherit; -webkit-appearance: none; touch-action: manipulation;
    }
    .field input:focus, .field textarea:focus {
      border-color: var(--t1); background: #fff;
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--t1) 18%, transparent);
    }
    .field textarea { resize: none; height: 58px; line-height: 1.4; }
    .required { color: #e53e3e; }

    /* ── Submit ────────────────────────────────────────────────────────────── */
    button[type="submit"] {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, var(--t1), var(--t2));
      color: #fff; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: opacity 0.2s, transform 0.1s, background 0.5s;
      margin-top: 4px; touch-action: manipulation; -webkit-appearance: none;
    }
    button[type="submit"]:active  { transform: scale(0.98); }
    button[type="submit"]:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── Alert ─────────────────────────────────────────────────────────────── */
    .alert { padding: 10px 13px; border-radius: 9px; font-size: 13px; font-weight: 500; margin-bottom: 12px; display: none; }
    .alert.error { background: #fff5f5; color: #c53030; border: 1px solid #fc8181; }
    .alert.show  { display: block; }

    /* ── Toast ─────────────────────────────────────────────────────────────── */
    .toast {
      position: fixed; top: 20px; left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: #276749; color: #fff;
      padding: 12px 26px; border-radius: 50px; font-size: 15px; font-weight: 600;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
      opacity: 0; z-index: 1000; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ── Backdrop ──────────────────────────────────────────────────────────── */
    .backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 200;
    }
    .backdrop.show { opacity: 1; pointer-events: all; }

    /* ── Drawer ────────────────────────────────────────────────────────────── */
    .drawer {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: 320px; max-width: 100vw; background: #1a1a2e;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
      z-index: 300; display: flex; flex-direction: column; overflow-y: auto;
    }
    .drawer.open { transform: translateX(0); }

    .drawer-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 22px 14px; border-bottom: 1px solid #2a2a4a;
      position: sticky; top: 0; background: #1a1a2e; z-index: 1;
    }
    .drawer-title { color: #fff; font-size: 15px; font-weight: 700; }
    .drawer-close {
      background: none; border: none; color: #666; font-size: 22px;
      cursor: pointer; line-height: 1; padding: 2px; transition: color 0.2s;
      touch-action: manipulation;
    }
    .drawer-close:hover { color: #fff; }
    .drawer-body { padding: 22px; flex: 1; }

    /* ── Settings fields ───────────────────────────────────────────────────── */
    .s-section { font-size: 11px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; }
    .s-divider { border: none; border-top: 1px solid #2a2a4a; margin: 18px 0; }

    .s-field { margin-bottom: 14px; }
    .s-field label { display: block; font-size: 11px; font-weight: 700; color: #888; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
    .s-field input {
      width: 100%; padding: 10px 13px; background: #0f0f1a;
      border: 1.5px solid #2a2a4a; border-radius: 8px;
      font-size: 16px; color: #fff; outline: none;
      transition: border-color 0.2s; font-family: inherit;
      -webkit-appearance: none; touch-action: manipulation;
    }
    .s-field input:focus { border-color: var(--t1); }
    .s-field input::placeholder { color: #444; }
    .s-hint { font-size: 11px; color: #555; margin-top: 4px; }

    .s-btn {
      width: 100%; padding: 11px; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: opacity 0.2s; touch-action: manipulation;
    }
    .s-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .s-btn-primary { background: linear-gradient(135deg, var(--t1), var(--t2)); color: #fff; transition: background 0.5s; }
    .s-btn-ghost   { background: transparent; color: #fc8181; border: 1.5px solid #fc8181; margin-top: 10px; }

    .s-alert { padding: 10px 13px; border-radius: 8px; font-size: 13px; font-weight: 500; margin-bottom: 14px; display: none; }
    .s-alert.success { background: #1a3a2a; color: #68d391; border: 1px solid #276749; }
    .s-alert.error   { background: #3a1a1a; color: #fc8181; border: 1px solid #822727; }
    .s-alert.show { display: block; }

    /* ── Theme swatches ────────────────────────────────────────────────────── */
    .theme-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
      margin-bottom: 4px;
    }
    .theme-swatch {
      aspect-ratio: 1; border-radius: 12px; cursor: pointer;
      border: 3px solid transparent;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 700; color: rgba(255,255,255,0.9);
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
      touch-action: manipulation; -webkit-appearance: none; outline: none;
    }
    .theme-swatch:hover { transform: scale(1.08); }
    .theme-swatch.active {
      border-color: #fff;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.35), 0 4px 12px rgba(0,0,0,0.4);
    }
    .theme-label { text-align: center; font-size: 10px; color: #555; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Responsive ────────────────────────────────────────────────────────── */
    @media (max-width: 480px) {
      .card { padding: 18px 18px; }
      .form-row { grid-template-columns: 1fr; gap: 0; }
      .drawer { width: 100vw; }
    }
  </style>
</head>
<body>

  <div class="toast" id="toast">✓ Contact saved!</div>
  <div class="backdrop" id="backdrop" onclick="closeSettings()"></div>

  <!-- Settings drawer -->
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <span class="drawer-title">⚙️ Settings</span>
      <button class="drawer-close" onclick="closeSettings()">✕</button>
    </div>
    <div class="drawer-body">

      <!-- Login -->
      <div id="s-loginView">
        <p style="color:#666;font-size:13px;margin-bottom:16px;">Admin access only.</p>
        <div class="s-alert" id="s-loginAlert"></div>
        <div class="s-field">
          <label>Admin Password</label>
          <input type="password" id="s-passwordInput" placeholder="Enter password" />
        </div>
        <button class="s-btn s-btn-primary" id="s-loginBtn" onclick="settingsLogin()">Sign In</button>
        <p style="margin-top:12px;font-size:11px;color:#444;text-align:center;">
          Set in Apps Script → Script Properties → <code style="color:var(--t1)">ADMIN_PASSWORD</code>
        </p>
      </div>

      <!-- Dashboard -->
      <div id="s-dashView" style="display:none">
        <div class="s-alert" id="s-configAlert"></div>

        <!-- Theme picker -->
        <div class="s-section">Theme</div>
        <div class="theme-grid" id="themeGrid"></div>

        <hr class="s-divider" />

        <!-- Event settings -->
        <div class="s-section">Event / Organisation</div>
        <div class="s-field">
          <label>Organisation Name</label>
          <input type="text" id="s-orgInput" placeholder="e.g. TechConf 2025" />
          <p class="s-hint">Added as the company on each contact.</p>
        </div>
        <div class="s-field">
          <label>Label / Group</label>
          <input type="text" id="s-labelInput" placeholder="e.g. TechConf 2025 Attendees" />
          <p class="s-hint">Creates a Google Contacts label for this group.</p>
        </div>

        <button class="s-btn s-btn-primary" id="s-saveBtn" onclick="saveSettings()">Save Settings</button>
        <hr class="s-divider" />
        <button class="s-btn s-btn-ghost" onclick="settingsSignOut()">Sign Out</button>
      </div>

    </div>
  </div>

  <!-- Main form card -->
  <div class="card">
    <button class="settings-btn" id="settingsBtn" onclick="openSettings()" title="Settings">⚙</button>

    <div class="header">
      <div class="icon">📋</div>
      <h1>Share Your Details</h1>
      <p class="subtitle">Fill in your contact information below.</p>
    </div>

    <div class="alert" id="alertBox"></div>

    <form id="contactForm" novalidate>
      <div class="form-row">
        <div class="field">
          <label>First Name <span class="required">*</span></label>
          <input type="text" name="firstName" placeholder="John"
                 autocomplete="given-name" inputmode="text" data-next="lastName" />
        </div>
        <div class="field">
          <label>Last Name</label>
          <input type="text" name="lastName" placeholder="Doe"
                 autocomplete="family-name" inputmode="text" data-next="email" />
        </div>
      </div>
      <div class="field">
        <label>Phone Number</label>
        <input type="tel" name="phone" placeholder="+91 98765 43210"
               autocomplete="tel" inputmode="tel" data-next="email" />
      </div>
      <div class="field">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="john@example.com"
               autocomplete="email" inputmode="email" data-next="jobTitle" />
      </div>
      <div class="field">
        <label>Job Title / Role</label>
        <input type="text" name="jobTitle" placeholder="Software Engineer"
               autocomplete="organization-title" inputmode="text" data-next="notes" />
      </div>
      <div class="field">
        <label>Notes <span style="color:#bbb;font-weight:400;text-transform:none;font-size:10px">(optional)</span></label>
        <textarea name="notes" placeholder="Anything you'd like to add..." data-last="true"></textarea>
      </div>
      <button type="submit" id="submitBtn">Submit Contact Details</button>
    </form>
  </div>

  <script src="config.js"></script>
  <script>
    // ── Theme definitions ─────────────────────────────────────────────────────
    const THEMES = [
      { key: 'purple',  label: 'Purple',   t1: '#667eea', t2: '#764ba2' },
      { key: 'ocean',   label: 'Ocean',    t1: '#2193b0', t2: '#6dd5ed' },
      { key: 'sunset',  label: 'Sunset',   t1: '#f093fb', t2: '#f5576c' },
      { key: 'forest',  label: 'Forest',   t1: '#0ba360', t2: '#3cba92' },
      { key: 'golden',  label: 'Golden',   t1: '#f7971e', t2: '#ffd200' },
      { key: 'night',   label: 'Night',    t1: '#232526', t2: '#414345' },
      { key: 'rose',    label: 'Rose',     t1: '#f953c6', t2: '#b91d73' },
      { key: 'mint',    label: 'Mint',     t1: '#00b09b', t2: '#96c93d' },
    ];

    let selectedTheme = 'purple';

    function applyTheme(key) {
      const t = THEMES.find(x => x.key === key) || THEMES[0];
      document.documentElement.style.setProperty('--t1', t.t1);
      document.documentElement.style.setProperty('--t2', t.t2);
      selectedTheme = t.key;
    }

    function renderSwatches(activeKey) {
      document.getElementById('themeGrid').innerHTML = THEMES.map(t => `
        <div style="text-align:center">
          <button class="theme-swatch ${t.key === activeKey ? 'active' : ''}"
                  style="background:linear-gradient(135deg,${t.t1},${t.t2});width:100%"
                  onclick="pickTheme('${t.key}')" title="${t.label}">
            ${t.key === activeKey ? '✓' : ''}
          </button>
          <div class="theme-label">${t.label}</div>
        </div>
      `).join('');
    }

    function pickTheme(key) {
      applyTheme(key);
      renderSwatches(key);
    }

    // ── Load theme on page start (from cache first, then server) ─────────────
    const cachedTheme = localStorage.getItem('formTheme');
    if (cachedTheme) applyTheme(cachedTheme);

    if (APPS_SCRIPT_URL && APPS_SCRIPT_URL !== 'PASTE_YOUR_APPS_SCRIPT_URL_HERE') {
      fetch(APPS_SCRIPT_URL + '?action=getConfig', { redirect: 'follow' })
        .then(r => r.json())
        .then(cfg => {
          if (cfg.theme) {
            applyTheme(cfg.theme);
            localStorage.setItem('formTheme', cfg.theme);
          }
        })
        .catch(() => {});
    }

    // ── Enter key → next field ────────────────────────────────────────────────
    const form = document.getElementById('contactForm');
    form.querySelectorAll('input, textarea').forEach(el => {
      el.addEventListener('keydown', e => {
        if (e.key !== 'Enter') return;
        if (el.dataset.last) { e.preventDefault(); form.dispatchEvent(new Event('submit', { cancelable: true })); }
        else if (el.dataset.next) { e.preventDefault(); form.querySelector(`[name="${el.dataset.next}"]`)?.focus(); }
      });
    });

    // ── Toast ─────────────────────────────────────────────────────────────────
    const toast = document.getElementById('toast');
    function showToast() {
      toast.classList.add('show');
      setTimeout(() => { toast.classList.remove('show'); setTimeout(() => location.reload(), 350); }, 2200);
    }

    // ── Alert ─────────────────────────────────────────────────────────────────
    const alertBox = document.getElementById('alertBox');
    function showAlert(msg, type) { alertBox.textContent = msg; alertBox.className = 'alert ' + type + ' show'; }

    // ── Submit ────────────────────────────────────────────────────────────────
    const submitBtn = document.getElementById('submitBtn');
    form.addEventListener('submit', async e => {
      e.preventDefault();
      alertBox.className = 'alert';
      if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === 'PASTE_YOUR_APPS_SCRIPT_URL_HERE') {
        showAlert('Form not configured. Open ⚙ Settings.', 'error'); return;
      }
      const data = Object.fromEntries(new FormData(form));
      if (!data.firstName.trim() && !data.lastName.trim()) {
        showAlert('Please enter at least your first name.', 'error'); return;
      }
      submitBtn.disabled = true; submitBtn.textContent = 'Saving...';
      try {
        const r = await fetch(APPS_SCRIPT_URL, {
          method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'addContact', ...data }), redirect: 'follow',
        });
        const res = await r.json();
        if (res.success) { showToast(); }
        else { showAlert(res.error || 'Something went wrong.', 'error'); submitBtn.disabled = false; submitBtn.textContent = 'Submit Contact Details'; }
      } catch { showAlert('Network error. Please try again.', 'error'); submitBtn.disabled = false; submitBtn.textContent = 'Submit Contact Details'; }
    });

    // ── Settings drawer ───────────────────────────────────────────────────────
    let adminPassword = '';

    function openSettings() {
      document.getElementById('drawer').classList.add('open');
      document.getElementById('backdrop').classList.add('show');
      document.getElementById('settingsBtn').classList.add('open');
      const saved = sessionStorage.getItem('adminPassword');
      if (saved) { adminPassword = saved; showDashView(); }
      else { showLoginView(); setTimeout(() => document.getElementById('s-passwordInput').focus(), 350); }
    }

    function closeSettings() {
      document.getElementById('drawer').classList.remove('open');
      document.getElementById('backdrop').classList.remove('show');
      document.getElementById('settingsBtn').classList.remove('open');
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeSettings();
      if (e.key === 'Enter' && document.getElementById('s-loginView').style.display !== 'none'
          && document.getElementById('drawer').classList.contains('open')) settingsLogin();
    });

    function showLoginView() {
      document.getElementById('s-loginView').style.display = 'block';
      document.getElementById('s-dashView').style.display  = 'none';
    }

    function showDashView() {
      document.getElementById('s-loginView').style.display = 'none';
      document.getElementById('s-dashView').style.display  = 'block';
      renderSwatches(selectedTheme);
      loadCurrentSettings();
    }

    async function settingsLogin() {
      const pw = document.getElementById('s-passwordInput').value;
      const btn = document.getElementById('s-loginBtn');
      if (!pw) return;
      btn.disabled = true; btn.textContent = 'Signing in...';
      try {
        const resp = await appsPost({ action: 'getStatus', password: pw });
        if (resp.error) { showSAlert('s-loginAlert', 'Incorrect password.', 'error'); btn.disabled = false; btn.textContent = 'Sign In'; return; }
        adminPassword = pw; sessionStorage.setItem('adminPassword', pw);
        showDashView(); applyFromResp(resp);
      } catch { showSAlert('s-loginAlert', 'Could not reach Apps Script. Check config.js.', 'error'); btn.disabled = false; btn.textContent = 'Sign In'; }
    }

    async function loadCurrentSettings() {
      try {
        const resp = await appsPost({ action: 'getStatus', password: adminPassword });
        if (resp.error) { settingsSignOut(); return; }
        applyFromResp(resp);
      } catch {}
    }

    function applyFromResp(data) {
      document.getElementById('s-orgInput').value   = data.organization || '';
      document.getElementById('s-labelInput').value = data.label        || '';
      if (data.theme) { applyTheme(data.theme); renderSwatches(data.theme); }
    }

    async function saveSettings() {
      const org   = document.getElementById('s-orgInput').value.trim();
      const label = document.getElementById('s-labelInput').value.trim();
      const btn   = document.getElementById('s-saveBtn');
      btn.disabled = true; btn.textContent = 'Saving...';
      try {
        const resp = await appsPost({ action: 'updateConfig', password: adminPassword, organization: org, label, theme: selectedTheme });
        if (resp.success) {
          localStorage.setItem('formTheme', selectedTheme);
          showSAlert('s-configAlert', '✓ Settings saved!', 'success');
        } else { showSAlert('s-configAlert', resp.error || 'Failed to save.', 'error'); }
      } catch { showSAlert('s-configAlert', 'Network error. Try again.', 'error'); }
      btn.disabled = false; btn.textContent = 'Save Settings';
    }

    function settingsSignOut() {
      sessionStorage.removeItem('adminPassword'); adminPassword = '';
      document.getElementById('s-passwordInput').value = '';
      document.getElementById('s-loginBtn').disabled = false; document.getElementById('s-loginBtn').textContent = 'Sign In';
      showLoginView();
    }

    async function appsPost(body) {
      const r = await fetch(APPS_SCRIPT_URL, {
        method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(body), redirect: 'follow',
      });
      return r.json();
    }

    function showSAlert(id, msg, type) { const el = document.getElementById(id); el.textContent = msg; el.className = 's-alert ' + type + ' show'; }
  </script>
</body>
</html>
